# Apply with: kubectl apply -f secrets.yaml
# Fill in base64-encoded values before applying
# Use: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: kayo-secrets
  namespace: kayo
type: Opaque
stringData:
  # Replace these with actual values
  DATABASE_URL: "postgresql://kayo:CHANGE_ME@rds-endpoint:5432/kayo_control_plane"
  REDIS_URL: "redis://elasticache-endpoint:6379/0"
  KAFKA_BOOTSTRAP_SERVERS: "msk-broker-1:9094,msk-broker-2:9094,msk-broker-3:9094"
  NEO4J_URI: "bolt://neo4j-private-ip:7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "CHANGE_ME"
  CLICKHOUSE_HOST: "clickhouse-private-ip"
  CLICKHOUSE_PASSWORD: "CHANGE_ME"
  SECRET_KEY: "CHANGE_ME_USE_RANDOM_32_CHARS"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "your_gmail@gmail.com"
  SMTP_PASSWORD: "your_16_digit_app_password"
  FROM_EMAIL: "your_gmail@gmail.com"
