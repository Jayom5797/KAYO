apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection-engine
  namespace: kayo
  labels:
    app: detection-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: detection-engine
  template:
    metadata:
      labels:
        app: detection-engine
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: detection-engine
          image: REGISTRY/kayo/detection-engine:VERSION
          command: ["python", "event_driven_detector.py"]
          envFrom:
            - secretRef:
                name: kayo-secrets
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: LOOKBACK_WINDOW
              value: "3600"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: rules
              mountPath: /app/rules
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: rules
          configMap:
            name: detection-rules
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: detection-engine-hpa
  namespace: kayo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: detection-engine
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
