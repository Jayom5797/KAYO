# Credential Dumping Detection
# MITRE ATT&CK: T1003 - OS Credential Dumping

rule_id: "T1003_credential_dumping"
name: "Credential Dumping Attempt"
severity: "critical"
mitre_technique: "T1003"
description: "Detects processes attempting to dump credentials from memory or disk"

query: |
  MATCH (p:Process)-[:RUNS_ON]->(h:Host)
  WHERE p.first_seen > timestamp() - $lookback_window
    AND (
      p.name IN ['mimikatz', 'procdump', 'lsass', 'gsecdump', 'wce', 'fgdump']
      OR p.cmdline CONTAINS 'lsass'
      OR p.cmdline CONTAINS '/proc/*/mem'
      OR p.cmdline CONTAINS 'sekurlsa'
      OR p.cmdline CONTAINS 'hashdump'
      OR p.cmdline CONTAINS 'SAM'
    )
  RETURN p.name as process,
         p.cmdline as command,
         h.hostname as host,
         p.first_seen as timestamp

threshold: 1
risk_score: 95
