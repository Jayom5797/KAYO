version: '3.8'

services:
  # PostgreSQL - Control Plane Database
  postgres:
    image: postgres:16-alpine
    container_name: kayo-postgres
    environment:
      POSTGRES_DB: kayo_control_plane
      POSTGRES_USER: kayo
      POSTGRES_PASSWORD: kayo_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kayo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache and Session Store
  redis:
    image: redis:7.2-alpine
    container_name: kayo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka - Message Streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: kayo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kayo-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ClickHouse - Event Storage
  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: kayo-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: kayo_events
      CLICKHOUSE_USER: kayo
      CLICKHOUSE_PASSWORD: kayo_dev_password
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infrastructure/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # Neo4j - Behavior Graph Database
  neo4j:
    image: neo4j:5.15-enterprise
    container_name: kayo-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/kayo_dev_password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # Detection Engine - Security Analysis
  detection-engine:
    build:
      context: ./services/detection-engine
      dockerfile: Dockerfile
    container_name: kayo-detection-engine
    depends_on:
      - postgres
      - neo4j
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_ADMIN_USER: neo4j
      NEO4J_ADMIN_PASSWORD: kayo_dev_password
      DATABASE_URL: postgresql://kayo:kayo_dev_password@postgres:5432/kayo_control_plane
      LOOKBACK_WINDOW: 3600
      RULES_DIRECTORY: rules
      LOG_LEVEL: INFO
    volumes:
      - ./services/detection-engine/rules:/app/rules:ro
    command: ["python", "event_driven_detector.py"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  clickhouse_data:
  neo4j_data:
  neo4j_logs:

networks:
  default:
    name: kayo-network
